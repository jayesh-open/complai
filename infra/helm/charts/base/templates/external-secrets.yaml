{{- if .Values.externalSecrets.enabled }}
# ---------------------------------------------------------------------------
# External Secrets Operator — ClusterSecretStore backed by AWS Secrets Manager
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.externalSecrets.clusterSecretStore.name }}
  labels:
    app.kubernetes.io/part-of: complai
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.clusterSecretStore.provider.region | default .Values.externalSecrets.clusterSecretStore.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.externalSecrets.clusterSecretStore.serviceAccountRef.name }}
            namespace: {{ .Values.externalSecrets.clusterSecretStore.serviceAccountRef.namespace }}
---
# ---------------------------------------------------------------------------
# ServiceAccount for External Secrets Operator (IRSA)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.clusterSecretStore.serviceAccountRef.name }}
  namespace: {{ .Values.externalSecrets.clusterSecretStore.serviceAccountRef.namespace }}
  labels:
    app.kubernetes.io/part-of: complai
  annotations:
    # Set the IRSA role ARN per environment via values override
    eks.amazonaws.com/role-arn: ""
{{- end }}
