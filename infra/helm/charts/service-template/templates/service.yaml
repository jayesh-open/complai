apiVersion: v1
kind: Service
metadata:
  name: {{ include "complai-service.fullname" . }}
  namespace: {{ .Values.service.namespace }}
  labels:
    {{- include "complai-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "complai-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: {{ .Values.service.protocol }}
